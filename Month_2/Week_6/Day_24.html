<!DOCTYPE html>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <style>

        .num-fav      { color: #e94560; }

<body>
<div id="root"></div>
<script type="text/babel">
    const { useState } = React;

    const MEALS = ["breakfast", "lunch", "dinner", "snack"];

    // ── Stats ─────────────────────────────────────────────
    function Stats({ recipes }) {
        const total    = recipes.length;
        const favs     = recipes.filter(r => r.favorite).length;
        const avgTime  = total === 0
            ? 0
            : Math.round(recipes.reduce((sum, r) => sum + r.cookTime, 0) / total);

        return (
            <div className="stats">
                <div className="stat-card">
                    <div className="stat-num num-total">{total}</div>
                    <div className="stat-label">Recipes</div>
                </div>
                <div className="stat-card">
                    <div className="stat-num num-fav">♥ {favs}</div>
                    <div className="stat-label">Favourites</div>
                </div>
                <div className="stat-card">
                    <div className="stat-num num-cooktime">{avgTime}m</div>
                    <div className="stat-label">Avg Cook Time</div>
                </div>
            </div>
        );
    }

    // ── RecipeForm ────────────────────────────────────────
    function RecipeForm({ onAdd }) {
        const [name,        setName]        = useState("");
        const [meal,        setMeal]        = useState("breakfast");
        const [cookTime,    setCookTime]    = useState("");
        const [desc,        setDesc]        = useState("");
        const [ingredients, setIngredients] = useState("");

        const handleAdd = () => {
            if (name.trim() === "" || cookTime === "" || isNaN(cookTime)) return;
            onAdd({
                name:        name.trim(),
                meal,
                cookTime:    parseInt(cookTime),
                desc:        desc.trim(),
                ingredients: ingredients.split(",").map(i => i.trim()).filter(i => i !== ""),
            });
            setName(""); setMeal("breakfast"); setCookTime(""); setDesc(""); setIngredients("");
        };

        return (
            <div className="form">
                <input
                    value={name}
                    onChange={e => setName(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && handleAdd()}
                    placeholder="Recipe name (e.g. Avocado Toast)"
                />
                <div className="form-row">
                    <select value={meal} onChange={e => setMeal(e.target.value)}>
                        {MEALS.map(m => (
                            <option key={m} value={m}>{m.charAt(0).toUpperCase() + m.slice(1)}</option>
                        ))}
                    </select>
                    <input
                        type="number"
                        value={cookTime}
                        onChange={e => setCookTime(e.target.value)}
                        placeholder="Cook time (mins)"
                    />
                </div>
                <input
                    value={ingredients}
                    onChange={e => setIngredients(e.target.value)}
                    placeholder="Ingredients, comma separated (e.g. eggs, butter, salt)"
                />
                <textarea
                    value={desc}
                    onChange={e => setDesc(e.target.value)}
                    placeholder="Short description or instructions..."
                />
                <button className="add-btn" onClick={handleAdd}>Add Recipe</button>
            </div>
        );
    }

    // ── RecipeCard ────────────────────────────────────────
    function RecipeCard({ recipe, onDelete, onFavorite }) {
        const [expanded, setExpanded] = useState(false);

        return (
            <div className="recipe-card">
                <div className="recipe-top">
                    <span className={`meal-badge badge-${recipe.meal}`}>{recipe.meal}</span>
                    <span className="recipe-name">{recipe.name}</span>
                    <span className="cooktime">⏱ {recipe.cookTime}m</span>
                    <button className="fav-btn" onClick={() => onFavorite(recipe.id)}>
                        {recipe.favorite ? "♥" : "♡"}
                    </button>
                    <button className="del-btn" onClick={() => onDelete(recipe.id)}>✕</button>
                </div>

                {recipe.desc !== "" && (
                    <>
                        <button className="expand-btn" onClick={() => setExpanded(prev => !prev)}>
                            {expanded ? "▲ Hide details" : "▼ Show details"}
                        </button>
                        {expanded && <p className="recipe-desc">{recipe.desc}</p>}
                    </>
                )}

                {recipe.ingredients.length > 0 && (
                    <div className="ingredients">
                        {recipe.ingredients.map((ing, i) => (
                            <span key={i} className="ingredient-tag">{ing}</span>
                        ))}
                    </div>
                )}
            </div>
        );
    }

    // ── App ───────────────────────────────────────────────
    function App() {
        const [recipes, setRecipes] = useState([]);
        const [filter,  setFilter]  = useState("all");

        const handleAdd = (recipe) => {
            setRecipes(prev => {
                const id = prev.length === 0 ? 1 : prev[prev.length - 1].id + 1;
                return [...prev, { ...recipe, id, favorite: false }];
            });
        };

        const handleDelete = (id) => {
            setRecipes(prev => prev.filter(r => r.id !== id));
        };

        const handleFavorite = (id) => {
            setRecipes(prev => prev.map(r =>
                r.id === id ? { ...r, favorite: !r.favorite } : r
            ));
        };

        const filtered = recipes.filter(r => {
            if (filter === "favorites")   return r.favorite;
            if (MEALS.includes(filter))   return r.meal === filter;
            return true;
        });

        return (
            <div className="app">
                <h1>🍳 Recipe Box</h1>
                <p className="subtitle">Save your favourite recipes</p>
                <Stats recipes={recipes} />
                <RecipeForm onAdd={handleAdd} />
                <div className="filters">
                    {["all", "favorites", ...MEALS].map(f => (
                        <button
                            key={f}
                            className={`filter-btn ${filter === f ? "active" : ""}`}
                            onClick={() => setFilter(f)}
                        >
                            {f.charAt(0).toUpperCase() + f.slice(1)}
                        </button>
                    ))}
                </div>
                {filtered.length === 0
                    ? <p className="empty">No recipes here.</p>
                    : filtered.map(recipe => (
                        <RecipeCard
                            key={recipe.id}
                            recipe={recipe}
                            onDelete={handleDelete}
                            onFavorite={handleFavorite}
                        />
                    ))
                }
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
