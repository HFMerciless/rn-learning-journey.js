<body>
<div id="root"></div>
<script type="text/babel">
    const { useState } = React;

    const questions = [
        {
            id: 1,
            question: "What hook do you use to manage state in React?",
            options: ["useEffect", "useState", "useRef", "useContext"],
            answer: "useState",
        },
        {
            id: 2,
            question: "Which method creates a new array without modifying the original?",
            options: [".push()", ".pop()", ".map()", ".sort()"],
            answer: ".map()",
        },
        {
            id: 3,
            question: "What does the 'key' prop do in a list?",
            options: [
                "Styles the element",
                "Helps React track list items",
                "Passes data to children",
                "Triggers a re-render",
            ],
            answer: "Helps React track list items",
        },
        {
            id: 4,
            question: "How do you prevent a function from being called immediately in onClick?",
            options: [
                "onClick={fn()}",
                "onClick={fn}",
                "onClick='fn'",
                "onClick={call fn}",
            ],
            answer: "onClick={fn}",
        },
        {
            id: 5,
            question: "What does .filter() return?",
            options: [
                "The first matching item",
                "A modified version of the original array",
                "A new array with items that pass the condition",
                "Nothing",
            ],
            answer: "A new array with items that pass the condition",
        },
    ];

    // ── ProgressBar ───────────────────────────────────────
    function ProgressBar({ current, total }) {
        const percent = (current / total) * 100;
        return (
            <>
                <p className="progress">Question {current} of {total}</p>
                <div className="progress-bar-bg">
                    <div className="progress-bar-fill" style={{ width: `${percent}%` }} />
                </div>
            </>
        );
    }

    // ── Question ──────────────────────────────────────────
    function Question({ data, onAnswer }) {
        const [selected, setSelected] = useState(null);

        const handleSelect = (option) => {
            if (selected) return;
            setSelected(option);
            onAnswer(option === data.answer);
        };

        const getClass = (option) => {
            if (!selected) return "";
            if (option === data.answer) return "correct";
            if (option === selected)   return "wrong";
            return "";
        };

        return (
            <>
                <h2>{data.question}</h2>
                <div className="options">
                    {data.options.map(option => (
                        <button
                            key={option}
                            className={`option-btn ${getClass(option)}`}
                            onClick={() => handleSelect(option)}
                            disabled={!!selected}
                        >
                            {option}
                        </button>
                    ))}
                </div>
                <p className={`feedback ${selected ? (selected === data.answer ? "correct" : "wrong") : ""}`}>
                    {selected
                        ? selected === data.answer
                            ? "✓ Correct!"
                            : `✗ Wrong — correct answer: ${data.answer}`
                        : ""}
                </p>
            </>
        );
    }

    // ── Result ────────────────────────────────────────────
    function Result({ score, total, onRestart }) {
        const percent = Math.round((score / total) * 100);
        const message = percent === 100
            ? "Perfect score! 🎉"
            : percent >= 60
                ? "Good job! 👍"
                : "Keep practicing! 💪";

        return (
            <div className="result">
                <h2>Quiz Complete!</h2>
                <div className="score">{score}/{total}</div>
                <p>{message}</p>
                <button className="restart-btn" onClick={onRestart}>Try Again</button>
            </div>
        );
    }

    // ── App ───────────────────────────────────────────────
    function App() {
        const [current,   setCurrent]   = useState(0);
        const [score,     setScore]     = useState(0);
        const [answered,  setAnswered]  = useState(false);
        const [finished,  setFinished]  = useState(false);

        const handleAnswer = (isCorrect) => {
            if (isCorrect) setScore(prev => prev + 1);
            setAnswered(true);
        };

        const handleNext = () => {
            if (current + 1 >= questions.length) {
                setFinished(true);
            } else {
                setCurrent(prev => prev + 1);
                setAnswered(false);
            }
        };

        const handleRestart = () => {
            setCurrent(0);
            setScore(0);
            setAnswered(false);
            setFinished(false);
        };

        if (finished) {
            return (
                <div className="card">
                    <Result score={score} total={questions.length} onRestart={handleRestart} />
                </div>
            );
        }

        return (
            <div className="card">
                <ProgressBar current={current + 1} total={questions.length} />
                <Question
                    key={current}
                    data={questions[current]}
                    onAnswer={handleAnswer}
                />
                {answered && (
                    <button className="next-btn" onClick={handleNext}>
                        {current + 1 >= questions.length ? "See Results" : "Next →"}
                    </button>
                )}
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
