<div id="root"></div>
<script type="text/babel">
    const { useState } = React;

    // ── TaskInput ──────────────────────────────────────────
    function TaskInput({ onAdd }) {
        const [text, setText] = useState("");

        const handleAdd = () => {
            if (text.trim() === "") return;
            onAdd(text.trim());
            setText("");
        };

        const handleKey = (e) => {
            if (e.key === "Enter") handleAdd();
        };

        return (
            <div className="input-row">
                <input
                    value={text}
                    onChange={e => setText(e.target.value)}
                    onKeyDown={handleKey}
                    placeholder="Add a new task..."
                />
                <button className="add-btn" onClick={handleAdd}>+</button>
            </div>
        );
    }

    // ── Stats ──────────────────────────────────────────────
    function Stats({ tasks }) {
        const total   = tasks.length;
        const done    = tasks.filter(t => t.done).length;
        const pending = total - done;

        return (
            <div className="stats">
                <div className="stat-box">
                    <div className={`num num-total`}>{total}</div>
                    <div className="label">Total</div>
                </div>
                <div className="stat-box">
                    <div className={`num num-done`}>{done}</div>
                    <div className="label">Done</div>
                </div>
                <div className="stat-box">
                    <div className={`num num-pending`}>{pending}</div>
                    <div className="label">Pending</div>
                </div>
            </div>
        );
    }

    // ── TaskCard ───────────────────────────────────────────
    function TaskCard({ task, onDelete, onToggle, onPriority }) {
        return (
            <div className={`task-card ${task.done ? "done" : ""}`}>
                <div className={`priority-dot dot-${task.priority}`} />
                <span className="task-text">{task.text}</span>
                <select
                    className="priority-select"
                    value={task.priority}
                    onChange={e => onPriority(task.id, e.target.value)}
                >
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
                {task.done
                    ? <button className="undo-btn"   onClick={() => onToggle(task.id)}>Undo</button>
                    : <button className="complete-btn" onClick={() => onToggle(task.id)}>Done</button>
                }
                <button className="delete-btn" onClick={() => onDelete(task.id)}>✕</button>
            </div>
        );
    }

    // ── App ────────────────────────────────────────────────
    function App() {
        const [tasks,  setTasks]  = useState([]);
        const [filter, setFilter] = useState("all");

        const handleAdd = (text) => {
            setTasks(prev => {
                const id = prev.length === 0 ? 1 : prev[prev.length - 1].id + 1;
                return [...prev, { id, text, done: false, priority: "medium" }];
            });
        };

        const handleDelete = (id) => {
            setTasks(prev => prev.filter(t => t.id !== id));
        };

        const handleToggle = (id) => {
            setTasks(prev => prev.map(t =>
                t.id === id ? { ...t, done: !t.done } : t
            ));
        };

        const handlePriority = (id, priority) => {
            setTasks(prev => prev.map(t =>
                t.id === id ? { ...t, priority } : t
            ));
        };

        const filtered = tasks.filter(t => {
            if (filter === "active")   return !t.done;
            if (filter === "done")     return  t.done;
            return true;
        });

        return (
            <div className="app">
                <h1>Task Manager</h1>
                <p className="subtitle">Stay on top of your day</p>
                <Stats tasks={tasks} />
                <TaskInput onAdd={handleAdd} />
                <div className="filters">
                    {["all", "active", "done"].map(f => (
                        <button
                            key={f}
                            className={`filter-btn ${filter === f ? "active" : ""}`}
                            onClick={() => setFilter(f)}
                        >
                            {f.charAt(0).toUpperCase() + f.slice(1)}
                        </button>
                    ))}
                </div>
                {filtered.length === 0
                    ? <p className="empty">No tasks here.</p>
                    : filtered.map(task => (
                        <TaskCard
                            key={task.id}
                            task={task}
                            onDelete={handleDelete}
                            onToggle={handleToggle}
                            onPriority={handlePriority}
                        />
                    ))
                }
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
