<div id="root"></div>
<script type="text/babel">
    const { useState } = React;

    const CATEGORIES = ["food", "fun", "other"];

    // ── Summary ───────────────────────────────────────────
    function Summary({ expenses }) {
        const total = expenses.reduce((sum, e) => sum + e.amount, 0);

        const byCategory = (cat) =>
            expenses
                .filter(e => e.category === cat)
                .reduce((sum, e) => sum + e.amount, 0);

        return (
            <div className="summary">
                <div className="summary-card">
                    <div className={`amount amount-total`}>${total.toFixed(2)}</div>
                    <div className="s-label">Total</div>
                </div>
                {CATEGORIES.map(cat => (
                    <div className="summary-card" key={cat}>
                        <div className={`amount amount-${cat}`}>${byCategory(cat).toFixed(2)}</div>
                        <div className="s-label">{cat}</div>
                    </div>
                ))}
            </div>
        );
    }

    // ── ExpenseForm ───────────────────────────────────────
    function ExpenseForm({ onAdd }) {
        const [name,     setName]     = useState("");
        const [amount,   setAmount]   = useState("");
        const [category, setCategory] = useState("food");

        const handleAdd = () => {
            if (name.trim() === "" || amount === "" || isNaN(amount)) return;
            onAdd({ name: name.trim(), amount: parseFloat(amount), category });
            setName("");
            setAmount("");
            setCategory("food");
        };

        return (
            <div className="form">
                <input
                    value={name}
                    onChange={e => setName(e.target.value)}
                    placeholder="Expense name (e.g. Pizza)"
                />
                <div className="form-row">
                    <input
                        type="number"
                        value={amount}
                        onChange={e => setAmount(e.target.value)}
                        placeholder="Amount ($)"
                    />
                    <select value={category} onChange={e => setCategory(e.target.value)}>
                        {CATEGORIES.map(cat => (
                            <option key={cat} value={cat}>
                                {cat.charAt(0).toUpperCase() + cat.slice(1)}
                            </option>
                        ))}
                    </select>
                </div>
                <button className="add-btn" onClick={handleAdd}>Add Expense</button>
            </div>
        );
    }

    // ── ExpenseList ───────────────────────────────────────
    function ExpenseList({ expenses, onDelete }) {
        if (expenses.length === 0) {
            return <p className="empty">No expenses yet.</p>;
        }

        return (
            <div>
                {expenses.map(e => (
                    <div className="expense-item" key={e.id}>
                        <div className={`category-dot dot-${e.category}`} />
                        <div style={{ flex: 1 }}>
                            <div className="expense-name">{e.name}</div>
                            <div className="expense-cat">{e.category}</div>
                        </div>
                        <span className="expense-price">${e.amount.toFixed(2)}</span>
                        <button className="del-btn" onClick={() => onDelete(e.id)}>✕</button>
                    </div>
                ))}
            </div>
        );
    }

    // ── App ───────────────────────────────────────────────
    function App() {
        const [expenses, setExpenses] = useState([]);
        const [filter,   setFilter]   = useState("all");

        const handleAdd = (expense) => {
            setExpenses(prev => {
                const id = prev.length === 0 ? 1 : prev[prev.length - 1].id + 1;
                return [...prev, { ...expense, id }];
            });
        };

        const handleDelete = (id) => {
            setExpenses(prev => prev.filter(e => e.id !== id));
        };

        const filtered = filter === "all"
            ? expenses
            : expenses.filter(e => e.category === filter);

        return (
            <div className="app">
                <h1>Expense Tracker</h1>
                <p className="subtitle">Track where your money goes</p>
                <Summary expenses={expenses} />
                <ExpenseForm onAdd={handleAdd} />
                <div className="filters">
                    {["all", ...CATEGORIES].map(f => (
                        <button
                            key={f}
                            className={`filter-btn ${filter === f ? "active" : ""}`}
                            onClick={() => setFilter(f)}
                        >
                            {f.charAt(0).toUpperCase() + f.slice(1)}
                        </button>
                    ))}
                </div>
                <ExpenseList expenses={filtered} onDelete={handleDelete} />
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
